services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: labscheduler-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SA_PASSWORD}"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
      - ./.docker/sqlserver/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "${SA_PASSWORD}" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    container_name: labscheduler-api
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://0.0.0.0:5000"
      ConnectionStrings__DefaultConnection: "${CONNECTION_STRING}"
    ports:
      - "5000:5000"
    depends_on:
      sqlserver:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      network: host
    container_name: labscheduler-web
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://0.0.0.0:8002"
      ApiBaseUrl: "http://api:5000"
    ports:
      - "8002:8002"
    depends_on:
      - api

volumes:
  sqlserver-data:
